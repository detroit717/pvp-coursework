services:
  app:
    build: .
    container_name: pvp-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    working_dir: /var/www/html
    depends_on:
      pvp_db:
        condition: service_healthy

  pvp_db:
    image: postgres:16
    container_name: pvp-db
    environment:
      POSTGRES_DB: pvp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Moscow
    ports:
      - "5433:5432"
    volumes:
      - pvp_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: pvp-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: pvp_db

volumes:
  pvp_data:
